<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0d8f0"/>
      <stop offset="50%" style="stop-color:#c8e0c8"/>
      <stop offset="100%" style="stop-color:#d0e8a0"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90c880"/>
      <stop offset="100%" style="stop-color:#507050"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky2)"/>
  <rect y="680" width="1920" height="400" fill="url(#road)"/>
  <!-- Large futuristic building left -->
  <rect x="30" y="150" width="220" height="530" rx="30" fill="#b8d0e8" opacity="0.75"/>
  <rect x="60" y="200" width="60" height="480" rx="8" fill="rgba(0,200,180,0.15)"/>
  <rect x="130" y="220" width="60" height="460" rx="8" fill="rgba(0,200,180,0.15)"/>
  <rect x="200" y="250" width="40" height="430" rx="8" fill="rgba(0,200,180,0.1)"/>
  <!-- Mid buildings -->
  <rect x="300" y="280" width="150" height="400" rx="20" fill="#c0d8e8" opacity="0.6"/>
  <rect x="1500" y="200" width="250" height="480" rx="25" fill="#b8d0e0" opacity="0.7"/>
  <rect x="1700" y="300" width="180" height="380" rx="20" fill="#c0d4e0" opacity="0.65"/>
  <!-- Super Trees -->
  <line x1="1100" y1="680" x2="1100" y2="350" stroke="#5ab840" stroke-width="20" stroke-linecap="round"/>
  <circle cx="1100" cy="330" r="70" fill="#4aaa30" opacity="0.8"/>
  <line x1="1220" y1="680" x2="1220" y2="400" stroke="#5ab840" stroke-width="16"/>
  <circle cx="1220" cy="380" r="55" fill="#50a838" opacity="0.75"/>
  <line x1="1050" y1="680" x2="1050" y2="450" stroke="#4a9828" stroke-width="14"/>
  <circle cx="1050" cy="432" r="45" fill="#489828" opacity="0.7"/>
  <!-- Merlion -->
  <rect x="1380" y="560" width="50" height="120" rx="5" fill="#c8d8e8" opacity="0.6"/>
  <circle cx="1405" cy="545" r="30" fill="#c0d0e0" opacity="0.6"/>
  <!-- Road with curve -->
  <path d="M0 760 Q480 700 960 740 Q1440 780 1920 720 L1920 1080 L0 1080Z" fill="rgba(100,160,80,0.4)"/>
  <!-- Overlay dark at bottom -->
  <rect y="780" width="1920" height="300" fill="rgba(10,14,26,0.55)"/>
</svg>
