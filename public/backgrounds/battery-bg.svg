<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="batsky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2030"/>
      <stop offset="50%" style="stop-color:#203040"/>
      <stop offset="100%" style="stop-color:#283820"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#batsky)"/>
  <!-- Large battery storage units -->
  <rect x="100" y="400" width="120" height="300" rx="8" fill="#283848" stroke="#7FE040" stroke-width="2"/>
  <rect x="240" y="400" width="120" height="300" rx="8" fill="#283848" stroke="#7FE040" stroke-width="1.5"/>
  <rect x="380" y="400" width="120" height="300" rx="8" fill="#283848" stroke="#7FE040" stroke-width="1.5"/>
  <!-- Fill indicators -->
  <rect x="110" y="580" width="100" height="110" rx="4" fill="#7FE040" opacity="0.8"/>
  <rect x="250" y="520" width="100" height="170" rx="4" fill="#D4E800" opacity="0.7"/>
  <rect x="390" y="560" width="100" height="130" rx="4" fill="#7FE040" opacity="0.6"/>
  <!-- Energy flow lines -->
  <path d="M520 540 Q700 480 900 520 Q1100 560 1300 500" stroke="#7FE040" stroke-width="3" fill="none" stroke-dasharray="20,10" opacity="0.6"/>
  <path d="M520 560 Q700 500 900 540 Q1100 580 1300 520" stroke="#D4E800" stroke-width="2" fill="none" stroke-dasharray="15,8" opacity="0.4"/>
  <!-- Smart city skyline right -->
  <rect x="1300" y="250" width="200" height="430" rx="15" fill="#304050" opacity="0.75"/>
  <rect x="1520" y="310" width="160" height="370" rx="12" fill="#283848" opacity="0.7"/>
  <rect x="1700" y="280" width="180" height="400" rx="14" fill="#304050" opacity="0.75"/>
  <!-- Power nodes -->
  <circle cx="900" cy="520" r="20" fill="#D4E800" opacity="0.8"/>
  <circle cx="900" cy="520" r="35" fill="none" stroke="#D4E800" stroke-width="2" opacity="0.4"/>
  <!-- Bottom dark -->
  <rect y="850" width="1920" height="230" fill="rgba(10,14,26,0.7)"/>
</svg>
