<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8"/>
      <stop offset="60%" style="stop-color:#d4e8c8"/>
      <stop offset="100%" style="stop-color:#a8c878"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78c870"/>
      <stop offset="100%" style="stop-color:#3a7840"/>
    </linearGradient>
    <linearGradient id="teal-overlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4B8;stop-opacity:0.3"/>
      <stop offset="40%" style="stop-color:#00D4B8;stop-opacity:0.0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect y="700" width="1920" height="380" fill="url(#ground)"/>
  <!-- Futuristic buildings silhouettes -->
  <rect x="50" y="200" width="180" height="500" rx="20" fill="#c8dce8" opacity="0.7"/>
  <rect x="100" y="300" width="80" height="400" rx="10" fill="#a8c8d8" opacity="0.5"/>
  <rect x="250" y="350" width="120" height="350" rx="15" fill="#b8d4e4" opacity="0.6"/>
  <rect x="1600" y="250" width="200" height="450" rx="20" fill="#c8dce8" opacity="0.7"/>
  <rect x="1650" y="180" width="100" height="520" rx="15" fill="#b0ccd8" opacity="0.5"/>
  <rect x="1750" y="300" width="140" height="400" rx="10" fill="#a8c4d0" opacity="0.6"/>
  <!-- Tree-like structures -->
  <circle cx="800" cy="600" r="80" fill="#5ab840" opacity="0.6"/>
  <circle cx="900" cy="550" r="60" fill="#4aa830" opacity="0.5"/>
  <circle cx="1100" cy="620" r="70" fill="#5ab840" opacity="0.6"/>
  <!-- Merlion-like statue silhouette -->
  <ellipse cx="1400" cy="680" rx="30" ry="60" fill="#c8d8e8" opacity="0.5"/>
  <!-- Teal left vignette -->
  <rect width="1920" height="1080" fill="url(#teal-overlay)"/>
  <!-- Bottom darkening -->
  <rect y="700" width="1920" height="380" fill="rgba(10,15,30,0.4)"/>
</svg>
