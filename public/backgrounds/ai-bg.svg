<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="aisky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90b888"/>
      <stop offset="40%" style="stop-color:#b8cca0"/>
      <stop offset="100%" style="stop-color:#d0d8b8"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6898b0"/>
      <stop offset="100%" style="stop-color:#507898"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#aisky)"/>
  <!-- Water / bay -->
  <path d="M900 620 Q1200 580 1920 640 L1920 1080 L900 1080Z" fill="url(#water)" opacity="0.8"/>
  <!-- Singapore iconic skyline -->
  <rect x="1000" y="320" width="60" height="300" rx="8" fill="#d0d8e0" opacity="0.8"/>
  <rect x="1070" y="280" width="80" height="340" rx="8" fill="#c8d0d8" opacity="0.8"/>
  <rect x="1160" y="260" width="60" height="360" rx="6" fill="#d0d8e0" opacity="0.75"/>
  <!-- Marina Bay Sands-like -->
  <rect x="1250" y="400" width="50" height="220" rx="5" fill="#c8d0d8"/>
  <rect x="1310" y="400" width="50" height="220" rx="5" fill="#c8d0d8"/>
  <rect x="1370" y="400" width="50" height="220" rx="5" fill="#c8d0d8"/>
  <rect x="1240" y="370" width="200" height="30" rx="8" fill="#b8c8d0"/>
  <!-- Gardens / super trees left -->
  <line x1="300" y1="680" x2="300" y2="320" stroke="#4a9830" stroke-width="18"/>
  <ellipse cx="300" cy="305" rx="90" ry="60" fill="#3a8820" opacity="0.85"/>
  <line x1="480" y1="680" x2="480" y2="370" stroke="#4a9830" stroke-width="14"/>
  <ellipse cx="480" cy="356" rx="70" ry="50" fill="#3a8820" opacity="0.8"/>
  <line x1="620" y1="680" x2="620" y2="400" stroke="#4a9830" stroke-width="12"/>
  <ellipse cx="620" cy="388" rx="60" ry="42" fill="#3a8820" opacity="0.75"/>
  <!-- Merlion silhouette -->
  <ellipse cx="870" cy="590" rx="25" ry="50" fill="#c8d4dc" opacity="0.6"/>
  <circle cx="870" cy="535" r="25" fill="#c0ccd4" opacity="0.6"/>
  <!-- Water sparkles -->
  <circle cx="1100" cy="680" r="3" fill="white" opacity="0.6"/>
  <circle cx="1300" cy="700" r="2" fill="white" opacity="0.5"/>
  <circle cx="1500" cy="660" r="3" fill="white" opacity="0.6"/>
  <!-- Bottom dark -->
  <rect y="850" width="1920" height="230" fill="rgba(10,14,26,0.6)"/>
</svg>
